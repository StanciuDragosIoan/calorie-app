<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalCount — Calorie Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Epilogue:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111210; --surface: #1a1c19; --surface2: #222420; --surface3: #2a2d28;
  --border: #2e312c; --border2: #383b35;
  --accent: #c8f060; --accent-dim: #8aaa3a; --accent-glow: rgba(200,240,96,0.12);
  --text: #e8ead4; --text-dim: #8a8e7a; --text-muted: #555850;
  --red: #ff6b6b; --orange: #f0a050; --radius: 12px; --radius-sm: 8px;
}
html { font-size: 16px; }
body { background: var(--bg); color: var(--text); font-family: 'Epilogue', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(ellipse 80% 50% at 20% -10%, rgba(200,240,96,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(200,240,96,0.04) 0%, transparent 50%);
}
.app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }

header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.6s ease both; }
.logo { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 3rem); font-weight: 700; letter-spacing: -1px; line-height: 1; }
.logo span { color: var(--accent); font-style: italic; }
.tagline { margin-top: 8px; color: var(--text-muted); font-size: 0.82rem; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; margin-bottom: 16px; }
.card-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; display: block; }

/* Search */
.search-row { display: flex; gap: 10px; }
.search-wrap { position: relative; flex: 1; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
#search-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: 'Epilogue', sans-serif; font-size: 0.97rem;
  padding: 13px 14px 13px 42px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
#search-input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px var(--accent-glow); }
#search-input::placeholder { color: var(--text-muted); }

.ac-drop {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm);
  max-height: 272px; overflow-y: auto; z-index: 200;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6); display: none;
}
.ac-drop.open { display: block; }
.ac-drop::-webkit-scrollbar { width: 4px; }
.ac-drop::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.ac-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.focused { background: var(--surface3); }
.ac-name { font-size: 0.88rem; color: var(--text); }
.ac-name em { color: var(--accent); font-style: normal; font-weight: 600; }
.ac-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ac-cat { font-size: 0.68rem; color: var(--text-muted); background: var(--surface3); padding: 2px 7px; border-radius: 20px; }
.ac-kcal { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent-dim); min-width: 58px; text-align: right; }
.ac-no { padding: 14px 16px; color: var(--text-muted); font-size: 0.85rem; text-align: center; }

.gram-row { display: flex; gap: 8px; }
#gram-input {
  width: 88px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 1rem; padding: 13px 10px; outline: none; text-align: center; transition: border-color 0.2s, box-shadow 0.2s;
}
#gram-input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px var(--accent-glow); }
.btn-add {
  background: var(--accent); color: #111210; border: none; border-radius: var(--radius-sm);
  font-family: 'Epilogue', sans-serif; font-size: 0.9rem; font-weight: 600; padding: 0 22px;
  cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s, transform 0.1s; white-space: nowrap;
}
.btn-add:hover { background: #d8f870; }
.btn-add:active { transform: scale(0.97); }
.btn-add:disabled { background: var(--surface3); color: var(--text-muted); cursor: not-allowed; }

.preview-bar {
  margin-top: 12px; padding: 11px 14px; background: var(--accent-glow);
  border: 1px solid rgba(200,240,96,0.18); border-radius: var(--radius-sm);
  display: none; align-items: center; justify-content: space-between; gap: 10px;
}
.preview-bar.show { display: flex; }
.preview-fname { font-size: 0.88rem; color: var(--text); }
.preview-fcat { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.preview-fcal { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--accent); flex-shrink: 0; }

/* Goal */
.goal-card { animation: fadeUp 0.5s ease 0.15s both; }
.goal-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.goal-row label { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; }
#goal-input {
  width: 90px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem; padding: 7px 10px; outline: none; text-align: center; transition: border-color 0.2s;
}
#goal-input:focus { border-color: var(--accent-dim); }
.goal-unit { font-size: 0.78rem; color: var(--text-muted); }
.goal-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
.goal-pct { font-size: 0.75rem; color: var(--text-muted); }
.goal-rem { font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.progress-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s; min-width: 0; }
.progress-fill.warn { background: var(--orange); }
.progress-fill.over { background: var(--red); }

/* Log */
.log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.log-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
.btn-clear { background: none; border: 1px solid var(--border2); border-radius: 20px; color: var(--text-muted); font-family: 'Epilogue', sans-serif; font-size: 0.72rem; padding: 4px 12px; cursor: pointer; transition: all 0.2s; }
.btn-clear:hover { border-color: var(--red); color: var(--red); }

.meal-list { display: flex; flex-direction: column; gap: 6px; }
.empty-state { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 30px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
.empty-icon { font-size: 1.8rem; margin-bottom: 8px; opacity: 0.4; }

.meal-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 13px 16px; display: grid; grid-template-columns: 1fr auto auto auto;
  align-items: center; gap: 14px; animation: itemIn 0.22s ease both; transition: border-color 0.2s;
}
.meal-item:hover { border-color: var(--border2); }
@keyframes itemIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
.item-name { font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-cat { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
.item-g { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-muted); }
.item-cal { font-family: 'JetBrains Mono', monospace; font-size: 0.92rem; font-weight: 500; color: var(--accent); min-width: 68px; text-align: right; }
.btn-rm { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 4px 6px; border-radius: 4px; transition: color 0.15s; }
.btn-rm:hover { color: var(--red); }

/* Total */
.total-bar {
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 20px 24px; margin-top: 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  animation: fadeUp 0.5s ease 0.25s both;
}
.total-left { display: flex; flex-direction: column; gap: 4px; }
.total-lbl { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.total-cnt { font-size: 0.8rem; color: var(--text-dim); }
.total-right { display: flex; align-items: baseline; gap: 6px; }
.total-num { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 5vw, 3.2rem); font-weight: 700; color: var(--accent); line-height: 1; transition: color 0.3s; }
.total-unit { font-size: 0.8rem; color: var(--text-muted); font-weight: 300; }

/* Dot indicators */
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
.dot-low { background: #5fb870; } .dot-med { background: var(--orange); } .dot-high { background: var(--red); }

/* Animations */
@keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:none; } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(14px); }  to { opacity:1; transform:none; } }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(200,240,96,0.45)} 70%{box-shadow:0 0 0 12px rgba(200,240,96,0)} 100%{box-shadow:0 0 0 0 rgba(200,240,96,0)} }
.pulse { animation: pulse 0.5s ease; }

.search-card { animation: fadeUp 0.5s ease 0.05s both; }

@media(max-width:580px) {
  .search-row { flex-direction: column; }
  .gram-row { width: 100%; }
  #gram-input { flex: 1; }
  .btn-add { flex: 1; }
  .item-g { display: none; }
  .meal-item { grid-template-columns: 1fr auto auto; }
}
</style>
</head>

<div class="app">

  <header>
    <div class="logo">Cal<span>Count</span></div>
    <div class="tagline">826 foods · kcal per 100g · type to search</div>
  </header>

  <!-- Search card -->
  <div class="card search-card">
    <span class="card-label">Add food</span>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search — chicken breast, salmon, pizza…" autocomplete="off" spellcheck="false" />
        <div class="ac-drop" id="ac-drop"></div>
      </div>
      <div class="gram-row">
        <input id="gram-input" type="number" value="100" min="1" max="9999" title="Grams" />

    <div class="preview-bar" id="preview-bar">
      <div>
        <div class="preview-fname" id="p-name">—</div>
        <div class="preview-fcat" id="p-cat">—</div>
      </div>
      <div class="preview-fcal" id="p-cal">—</div>

  </div>

  <!-- Goal card -->
  <div class="card goal-card">
    <span class="card-label">Daily goal</span>
    <div class="goal-row">
      <label for="goal-input">Target:</label>
      <input id="goal-input" type="number" value="2000" min="500" max="15000" />
      <span class="goal-unit">kcal / day</span>

    <div class="goal-meta">
      <span class="goal-pct" id="g-pct">0% of goal</span>
      <span class="goal-rem" id="g-rem">2000 kcal remaining</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>

  <!-- Log -->
  <div style="animation: fadeUp 0.5s ease 0.2s both;">
    <div class="log-header">
      <span class="log-title">Today's log</span>
      <button class="btn-clear" id="btn-clear">Clear all</button>
    </div>
    <div class="meal-list" id="meal-list">
      <div class="empty-state"><div class="empty-icon">🥗</div>Search a food above and add it to start tracking</div>
    </div>
  </div>

  <!-- Total -->
  <div class="total-bar">
    <div class="total-left">
      <div class="total-lbl">Total calories</div>
      <div class="total-cnt" id="t-cnt">0 items</div>
    </div>
    <div class="total-right">
      <div class="total-num" id="t-num">0</div>
      <div class="total-unit">kcal</div>
    </div>
  </div>

</div>

// ── CAT LABELS ─────────────────────────────────────────────────────────────────
const CAT={meat:'Meat',fish_and_seafood:'Fish',eggs_and_dairy:'Dairy',vegetables:'Veg',fruits:'Fruit',grains_and_cereals:'Grains',legumes:'Legumes',nuts_and_seeds:'Nuts',oils_and_fats:'Oils',soy_products:'Soy',herbs_and_spices:'Herbs',condiments_and_sauces:'Condiments',sweeteners_and_sugars:'Sweeteners',beverages:'Drinks',cooked_foods:'Cooked',sweets_and_desserts:'Sweets'};

// ── FLATTEN ────────────────────────────────────────────────────────────────────
const FOODS=[];
function flat(o,cat){
  if(Array.isArray(o)){o.forEach(i=>{if(i.name&&i.calories!==undefined)FOODS.push({name:i.name,cal:i.calories,cat})});}
  else if(o&&typeof o==='object'){Object.entries(o).forEach(([k,v])=>{if(k!=='note')flat(v,cat);});}
}
Object.entries(RAW.foods).forEach(([k,v])=>flat(v,CAT[k]||k));

// ── STATE ──────────────────────────────────────────────────────────────────────
let selected=null, log=[], focusIdx=-1, results=[];

// ── REFS ───────────────────────────────────────────────────────────────────────
const SI=document.getElementById('search-input');
const GI=document.getElementById('gram-input');
const AC=document.getElementById('ac-drop');
const ADD=document.getElementById('btn-add');
const ML=document.getElementById('meal-list');
const TN=document.getElementById('t-num');
const TC=document.getElementById('t-cnt');
const PRG=document.getElementById('progress');
const GOAL=document.getElementById('goal-input');
const GPCT=document.getElementById('g-pct');
const GREM=document.getElementById('g-rem');
const CLR=document.getElementById('btn-clear');
const PB=document.getElementById('preview-bar');
const PN=document.getElementById('p-name');
const PC=document.getElementById('p-cat');
const PCAL=document.getElementById('p-cal');

// ── SEARCH ─────────────────────────────────────────────────────────────────────
function hl(text,q){
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<em>$1</em>');
}

SI.addEventListener('input',()=>{
  const q=SI.value.trim().toLowerCase();
  focusIdx=-1;
  if(!q){closeAC();clearSel();return;}
  results=FOODS.filter(f=>f.name.toLowerCase().includes(q)).slice(0,12);
  if(!results.length){AC.innerHTML=`<div class="ac-no">No results for "${q}"</div>`;AC.classList.add('open');return;}
  AC.innerHTML=results.map((f,i)=>`
    <div class="ac-item" data-i="${i}">
      <span class="ac-name">${hl(f.name,q)}</span>
      <span class="ac-right"><span class="ac-cat">${f.cat}</span><span class="ac-kcal">${f.cal} kcal</span></span>
    </div>`).join('');
  AC.classList.add('open');
  AC.querySelectorAll('.ac-item').forEach(el=>el.addEventListener('mousedown',e=>{e.preventDefault();pick(results[+el.dataset.i]);}));
});

SI.addEventListener('keydown',e=>{
  const its=AC.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){e.preventDefault();focusIdx=Math.min(focusIdx+1,its.length-1);setFocus(its);}
  else if(e.key==='ArrowUp'){e.preventDefault();focusIdx=Math.max(focusIdx-1,0);setFocus(its);}
  else if(e.key==='Enter'){e.preventDefault();if(focusIdx>=0&&results[focusIdx])pick(results[focusIdx]);else if(selected)addItem();}
  else if(e.key==='Escape')closeAC();
});

function setFocus(its){
  its.forEach((el,i)=>el.classList.toggle('focused',i===focusIdx));
  if(its[focusIdx])its[focusIdx].scrollIntoView({block:'nearest'});
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))closeAC();});
function closeAC(){AC.classList.remove('open');AC.innerHTML='';results=[];focusIdx=-1;}

function pick(f){
  selected=f;SI.value=f.name;closeAC();ADD.disabled=false;
  PN.textContent=f.name;PC.textContent=f.cat;PB.classList.add('show');
  updatePrev();
}
function clearSel(){selected=null;ADD.disabled=true;PB.classList.remove('show');}

GI.addEventListener('input',updatePrev);
function updatePrev(){
  if(!selected)return;
  const g=parseFloat(GI.value)||0;
  PCAL.textContent=`${selected.cal} kcal/100g → ${Math.round(selected.cal*g/100)} kcal for ${g}g`;
}

// ── LOCALSTORAGE ───────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0,10);
const LS_LOG  = 'calcount_log_' + TODAY;
const LS_GOAL = 'calcount_goal';

function saveLog()  { try { localStorage.setItem(LS_LOG, JSON.stringify(log)); } catch(e){} }
function saveGoal() { try { localStorage.setItem(LS_GOAL, GOAL.value); } catch(e){} }

function loadState() {
  const savedGoal = localStorage.getItem(LS_GOAL);
  if (savedGoal) GOAL.value = savedGoal;
  try {
    const saved = localStorage.getItem(LS_LOG);
    if (saved) log = JSON.parse(saved);
  } catch(e) { log = []; }
  // Clean up keys older than 7 days
  try {
    Object.keys(localStorage)
      .filter(k => k.startsWith('calcount_log_') && k !== LS_LOG)
      .sort().slice(0, -6)
      .forEach(k => localStorage.removeItem(k));
  } catch(e) {}
}

// ── ADD ────────────────────────────────────────────────────────────────────────
ADD.addEventListener('click',addItem);
function addItem(){
  if(!selected)return;
  const g=parseFloat(GI.value);
  if(!g||g<=0){GI.focus();return;}
  log.push({id:Date.now(),name:selected.name,cat:selected.cat,g,cal:Math.round(selected.cal*g/100)});
  render();total();saveLog();
  SI.value='';GI.value=100;clearSel();
  TN.classList.remove('pulse');void TN.offsetWidth;TN.classList.add('pulse');
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function dot(cal){
  return cal<100?'<span class="dot dot-low"></span>':cal<300?'<span class="dot dot-med"></span>':'<span class="dot dot-high"></span>';
}
function render(){
  if(!log.length){ML.innerHTML=`<div class="empty-state"><div class="empty-icon">🥗</div>Search a food above and add it to start tracking</div>`;return;}
  ML.innerHTML=log.map(i=>`
    <div class="meal-item">
      <div><div class="item-name">${dot(i.cal/i.g*100)}${i.name}</div><div class="item-cat">${i.cat}</div></div>
      <div class="item-g">${i.g}g</div>
      <div class="item-cal">${i.cal} kcal</div>
      <button class="btn-rm" data-id="${i.id}">✕</button>
    </div>`).join('');
  ML.querySelectorAll('.btn-rm').forEach(b=>b.addEventListener('click',()=>{
    log=log.filter(x=>x.id!==+b.dataset.id);render();total();saveLog();
  }));
}

CLR.addEventListener('click',()=>{log=[];render();total();saveLog();});

// ── TOTAL ──────────────────────────────────────────────────────────────────────
function total(){
  const sum=log.reduce((s,i)=>s+i.cal,0);
  const goal=parseInt(GOAL.value)||2000;
  const pct=Math.min(sum/goal*100,100);
  const over=sum>goal;
  TN.textContent=sum.toLocaleString();
  TC.textContent=`${log.length} item${log.length!==1?'s':''}`;
  PRG.style.width=pct+'%';
  PRG.className='progress-fill'+(over?' over':pct>=80?' warn':'');
  const rawPct=goal?Math.round(sum/goal*100):0;
  GPCT.textContent=`${rawPct}% of goal`;
  const rem=goal-sum;
  GREM.textContent=rem>=0?`${rem.toLocaleString()} kcal remaining`:`${Math.abs(rem).toLocaleString()} kcal over`;
  GREM.style.color=rem<0?'var(--red)':rem<200?'var(--orange)':'var(--text-dim)';
}

GOAL.addEventListener('input',()=>{total();saveGoal();});

// ── INIT ───────────────────────────────────────────────────────────────────────
loadState();
render();
total();
SI.focus();
</script>
